server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md

milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  username: ${MILVUS_USERNAME:}
  password: ${MILVUS_PASSWORD:}
  database: default
  timeout: 10000

# Spring AI Alibaba DashScope 配置
spring:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-turbo
          timeout: 180000
      retry:
        max-attempts: 3
        backoff:
          initial-interval: 2000
          multiplier: 2
          max-interval: 10000

    # Spring AI MCP 客户端配置（使用真实日志查询时取消注释并配置环境变量）
    # mcp:
    #   client:
    #     enabled: true
    #     name: tencent-mcp-server
    #     version: 1.0.0
    #     request-timeout: 60s
    #     type: ASYNC
    #     sse:
    #       connections:
    #         tencent-cls:
    #           url: ${TENCENT_MCP_URL:https://mcp-api.tencent-cloud.com}
    #           sse-endpoint: ${TENCENT_MCP_SSE_ENDPOINT:}

# 阿里云 DashScope Embedding API 配置
dashscope:
  api:
    key: ${DASHSCOPE_API_KEY:}
  embedding:
    model: text-embedding-v4

# 文档分片配置
document:
  chunk:
    max-size: 800
    overlap: 100

# RAG 配置
rag:
  top-k: 3
  model: "qwen3-max"

# 启动自动导入配置
aiops:
  docs:
    auto-import: true
    path: ./aiops-docs

# Prometheus 配置
prometheus:
  base-url: ${PROMETHEUS_BASE_URL:http://localhost:9090}
  timeout: 10
  mock-enabled: false

# CLS 云日志服务配置
cls:
  mock-enabled: true
  region: ${CLS_REGION:ap-guangzhou}
  logset-id: ${CLS_LOGSET_ID:}
  topics:
    system-metrics: ${CLS_TOPIC_SYSTEM_METRICS:}
